name: Validate guide

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.14"

      - name: Check lockfile
        run: uv lock --check

      - name: Validate Markdown
        run: uv run python scripts/validate_markdown.py

      - name: Check local links
        run: uv run python scripts/check_links.py

      - name: Check external links
        run: uv run python scripts/check_links.py --external
